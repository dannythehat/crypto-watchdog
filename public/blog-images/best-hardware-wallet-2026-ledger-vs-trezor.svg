    <text x="46" y="40" font-family="'Space Grotesk',Arial,sans-serif" font-size="32" font-weight="700" fill="#FFFFFF">Crypto<tspan fill="#5B8DEF">Watchdog</tspan></text>
  </g>
  <!-- category pill -->
  <g transform="translate(80,210)">
    <rect width="153" height="44" rx="22" fill="#2662D9" fill-opacity="0.16" stroke="#2662D9" stroke-opacity="0.5"/>
    <text x="24" y="29" font-family="Arial,sans-serif" font-size="18" font-weight="700" letter-spacing="2" fill="#7FA7F5">WALLETS</text>

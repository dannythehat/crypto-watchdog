  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>
  <!-- shield watermark -->
  <g transform="translate(815,150) scale(7)" opacity="0.06">

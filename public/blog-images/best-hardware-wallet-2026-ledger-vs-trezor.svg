  <text x="80" y="360" font-family="'Space Grotesk',Arial,sans-serif" font-size="62" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">Which Hardware Wallet</text>
  <text x="80" y="436" font-family="'Space Grotesk',Arial,sans-serif" font-size="62" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">Is Safest?</text>
  <line x1="80" y1="540" x2="180" y2="540" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <text x="80" y="578" font-family="Arial,sans-serif" font-size="22" fill="#9AA4B8">Independent, evidence-led crypto safety reviews</text>

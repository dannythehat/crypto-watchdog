<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" role="img" aria-label="Ledger vs Trezor scorecard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0C12"/><stop offset="1" stop-color="#10162A"/>
    </linearGradient>
    <linearGradient id="ledger" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2662D9"/><stop offset="1" stop-color="#5B8DEF"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="470" rx="20" fill="url(#bg)"/>
  <text x="40" y="58" font-family="'Space Grotesk',Arial,sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">Ledger vs Trezor — at a glance</text>

  <!-- Ledger card -->
  <g transform="translate(40,86)">
    <rect width="440" height="344" rx="16" fill="#FFFFFF" fill-opacity="0.04" stroke="#2662D9" stroke-opacity="0.35"/>
    <rect x="0" y="0" width="440" height="56" rx="16" fill="#2662D9" fill-opacity="0.12"/>
    <circle cx="34" cy="28" r="12" fill="url(#ledger)"/>
    <text x="58" y="36" font-family="'Space Grotesk',Arial,sans-serif" font-size="22" font-weight="700" fill="#7FA7F5">LEDGER</text>
    <text x="28" y="100" font-family="Arial,sans-serif" font-size="18" fill="#D5DBE6">Secure Element (closed-source BOLOS)</text>
    <text x="28" y="140" font-family="Arial,sans-serif" font-size="18" fill="#D5DBE6">5,500+ coins supported</text>
    <text x="28" y="180" font-family="Arial,sans-serif" font-size="18" fill="#D5DBE6">Polished app + mobile (Bluetooth)</text>
    <text x="28" y="220" font-family="Arial,sans-serif" font-size="18" fill="#D5DBE6">Nano S Plus · Nano X · Flex · Stax</text>
    <text x="28" y="300" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#7FA7F5">BEST FOR: widest coins, beginners</text>
  </g>

  <!-- VS -->
  <circle cx="500" cy="258" r="26" fill="#10162A" stroke="#2a3450" stroke-width="2"/>
  <text x="500" y="265" text-anchor="middle" font-family="'Space Grotesk',Arial,sans-serif" font-size="18" font-weight="700" fill="#9AA4B8">VS</text>

  <!-- Trezor card -->
  <g transform="translate(520,86)">
    <rect width="440" height="344" rx="16" fill="#FFFFFF" fill-opacity="0.04" stroke="#1FAE5E" stroke-opacity="0.35"/>
    <rect x="0" y="0" width="440" height="56" rx="16" fill="#1FAE5E" fill-opacity="0.12"/>
    <circle cx="34" cy="28" r="12" fill="#1FAE5E"/>
    <text x="58" y="36" font-family="'Space Grotesk',Arial,sans-serif" font-size="22" font-weight="700" fill="#4FD693">TREZOR</text>
    <text x="28" y="100" font-family="Arial,sans-serif" font-size="18" fill="#D5DBE6">100% open-source firmware</text>
    <text x="28" y="140" font-family="Arial,sans-serif" font-size="18" fill="#D5DBE6">~1,400 coins supported</text>
    <text x="28" y="180" font-family="Arial,sans-serif" font-size="18" fill="#D5DBE6">Secure element in Safe 3 / Safe 5</text>
    <text x="28" y="220" font-family="Arial,sans-serif" font-size="18" fill="#D5DBE6">Safe 3 (value) · Safe 5 (touch)</text>
    <text x="28" y="300" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#4FD693">BEST FOR: transparency, self-custody</text>
  </g>
</svg>

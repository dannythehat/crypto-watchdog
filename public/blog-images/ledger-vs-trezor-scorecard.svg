<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420" role="img" aria-label="Ledger vs Trezor scorecard">
  <rect width="1000" height="420" rx="16" fill="#0C0E14"/>
  <text x="40" y="56" font-family="'Space Grotesk',Arial,sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">Ledger vs Trezor — at a glance</text>
  <line x1="500" y1="90" x2="500" y2="390" stroke="#2a3142" stroke-width="2"/>
  <!-- Ledger -->
  <text x="40" y="120" font-family="'Space Grotesk',Arial,sans-serif" font-size="24" font-weight="700" fill="#2662D9">LEDGER</text>
  <text x="40" y="165" font-family="Arial,sans-serif" font-size="19" fill="#cdd3df">• Secure Element (closed-source BOLOS)</text>
  <text x="40" y="200" font-family="Arial,sans-serif" font-size="19" fill="#cdd3df">• 5,500+ coins supported</text>
  <text x="40" y="235" font-family="Arial,sans-serif" font-size="19" fill="#cdd3df">• Best app + mobile (Bluetooth)</text>
  <text x="40" y="270" font-family="Arial,sans-serif" font-size="19" fill="#cdd3df">• Models: Nano S Plus, Nano X, Flex, Stax</text>
  <text x="40" y="318" font-family="Arial,sans-serif" font-size="17" fill="#8a93a6">Best for: widest coins, beginners</text>
  <!-- Trezor -->
  <text x="540" y="120" font-family="'Space Grotesk',Arial,sans-serif" font-size="24" font-weight="700" fill="#1FAE5E">TREZOR</text>
  <text x="540" y="165" font-family="Arial,sans-serif" font-size="19" fill="#cdd3df">• 100% open-source firmware</text>
  <text x="540" y="200" font-family="Arial,sans-serif" font-size="19" fill="#cdd3df">• ~1,400 coins supported</text>
  <text x="540" y="235" font-family="Arial,sans-serif" font-size="19" fill="#cdd3df">• Secure element in Safe 3 / Safe 5</text>
  <text x="540" y="270" font-family="Arial,sans-serif" font-size="19" fill="#cdd3df">• Models: Safe 3 (value), Safe 5 (touch)</text>
  <text x="540" y="318" font-family="Arial,sans-serif" font-size="17" fill="#8a93a6">Best for: transparency, self-custody purists</text>
  <rect x="0" y="0" width="1000" height="420" rx="16" fill="none" stroke="#2a3142" stroke-width="2"/>
</svg>

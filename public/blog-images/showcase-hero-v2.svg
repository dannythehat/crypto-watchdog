<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Ledger vs Trezor 2026 hardware wallet comparison">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#080A11"/><stop offset="0.5" stop-color="#0E1426"/><stop offset="1" stop-color="#070912"/></linearGradient>
    <radialGradient id="gBlue" cx="0.32" cy="0.4" r="0.5"><stop offset="0" stop-color="#2E6BFF" stop-opacity="0.7"/><stop offset="1" stop-color="#2E6BFF" stop-opacity="0"/></radialGradient>
    <radialGradient id="gGreen" cx="0.68" cy="0.45" r="0.5"><stop offset="0" stop-color="#13C29B" stop-opacity="0.6"/><stop offset="1" stop-color="#13C29B" stop-opacity="0"/></radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#283041"/><stop offset="0.5" stop-color="#363f54"/><stop offset="1" stop-color="#161b27"/></linearGradient>
    <linearGradient id="accentB" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5B8DEF"/><stop offset="1" stop-color="#2E6BFF"/></linearGradient>
    <linearGradient id="accentG" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4FD693"/><stop offset="1" stop-color="#13C29B"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF" stop-opacity="0.12"/><stop offset="1" stop-color="#FFFFFF" stop-opacity="0.02"/></linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#BFD0EC"/></linearGradient>
    <filter id="blur" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000" flood-opacity="0.6"/></filter>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#gBlue)"/>
  <rect width="1200" height="630" fill="url(#gGreen)"/>
  <g stroke="#FFFFFF" stroke-opacity="0.035" stroke-width="1"><path d="M0 157 H1200 M0 315 H1200 M0 472 H1200 M300 0 V630 M600 0 V630 M900 0 V630"/></g>
  <rect x="0" y="0" width="1200" height="5" fill="url(#accentB)"/>

  <!-- LEDGER device (left, tilted) -->
  <g transform="translate(395,150) rotate(-10)">
    <rect x="-24" y="-10" width="168" height="276" rx="44" fill="#2E6BFF" opacity="0.45" filter="url(#blur)"/>
    <g filter="url(#soft)">
      <rect x="0" y="0" width="120" height="248" rx="26" fill="url(#metal)" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <rect x="16" y="26" width="88" height="128" rx="13" fill="#05070E" stroke="#2E6BFF" stroke-opacity="0.55"/>
      <g filter="url(#glow)"><path d="M40 92 L56 110 L88 66" stroke="#5B8DEF" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
      <circle cx="60" cy="200" r="15" fill="#10151f" stroke="#2E6BFF" stroke-opacity="0.5" stroke-width="2"/>
      <circle cx="60" cy="200" r="5" fill="#5B8DEF"/>
      <rect x="9" y="10" width="12" height="228" rx="6" fill="#FFFFFF" opacity="0.06"/>
    </g>
  </g>

  <!-- TREZOR device (right, tilted) -->
  <g transform="translate(685,150) rotate(10)">
    <rect x="-24" y="-10" width="168" height="276" rx="44" fill="#13C29B" opacity="0.4" filter="url(#blur)"/>
    <g filter="url(#soft)">
      <rect x="0" y="0" width="120" height="248" rx="26" fill="url(#metal)" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <rect x="16" y="26" width="88" height="128" rx="13" fill="#05070E" stroke="#13C29B" stroke-opacity="0.55"/>
      <g filter="url(#glow)"><path d="M44 70 v52 M44 70 h22 a16 16 0 0 1 0 32 h-22 M58 102 l18 20" stroke="#4FD693" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
      <circle cx="60" cy="200" r="15" fill="#10151f" stroke="#13C29B" stroke-opacity="0.5" stroke-width="2"/>
      <circle cx="60" cy="200" r="5" fill="#4FD693"/>
      <rect x="9" y="10" width="12" height="228" rx="6" fill="#FFFFFF" opacity="0.06"/>
    </g>
  </g>

  <!-- VS badge -->
  <g transform="translate(600,250)" filter="url(#soft)">
    <circle r="38" fill="#0E1426" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="2"/>
    <circle r="38" fill="none" stroke="url(#accentB)" stroke-opacity="0.6" stroke-width="2"/>
    <text y="9" text-anchor="middle" font-family="'Space Grotesk',Arial,sans-serif" font-size="26" font-weight="700" fill="#E6ECF7">VS</text>
  </g>

  <!-- glass title card -->
  <g filter="url(#soft)">
    <rect x="64" y="430" width="1072" height="150" rx="24" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <rect x="64" y="430" width="1072" height="2" fill="#FFFFFF" fill-opacity="0.22"/>
  </g>
  <g transform="translate(92,452)">
    <path d="M0 0 L24 9 L24 24 C24 40 12 48 12 48 C12 48 0 40 0 24 Z" fill="url(#accentB)"/>
    <text x="38" y="33" font-family="'Space Grotesk',Arial,sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">Crypto<tspan fill="#5B8DEF">Watchdog</tspan></text>
  </g>
  <text x="92" y="548" font-family="'Space Grotesk',Arial,sans-serif" font-size="44" font-weight="700" fill="url(#title)" letter-spacing="-0.5">Ledger vs Trezor 2026 — Which Hardware Wallet Is Safest?</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Ledger vs Trezor 2026">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080A11"/><stop offset="0.5" stop-color="#0E1424"/><stop offset="1" stop-color="#070912"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.2" cy="0.15" r="0.7"><stop offset="0" stop-color="#2E6BFF" stop-opacity="0.65"/><stop offset="1" stop-color="#2E6BFF" stop-opacity="0"/></radialGradient>
    <radialGradient id="g2" cx="0.9" cy="0.85" r="0.7"><stop offset="0" stop-color="#13C29B" stop-opacity="0.45"/><stop offset="1" stop-color="#13C29B" stop-opacity="0"/></radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5B8DEF"/><stop offset="1" stop-color="#2E6BFF"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF" stop-opacity="0.10"/><stop offset="1" stop-color="#FFFFFF" stop-opacity="0.02"/></linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#C3D0E8"/></linearGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="55"/></filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="20" stdDeviation="35" flood-color="#000000" flood-opacity="0.55"/></filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="14" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="240" cy="90" rx="420" ry="320" fill="url(#g1)" filter="url(#blur)"/>
  <ellipse cx="1050" cy="560" rx="420" ry="320" fill="url(#g2)" filter="url(#blur)"/>

  <!-- fine grid texture -->
  <g stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 158 H1200 M0 316 H1200 M0 474 H1200 M300 0 V630 M600 0 V630 M900 0 V630"/>
  </g>

  <!-- floating glass accent shapes -->
  <rect x="930" y="70" width="150" height="150" rx="34" fill="url(#accent)" opacity="0.25" filter="url(#blur)"/>
  <rect x="120" y="430" width="120" height="120" rx="28" fill="#13C29B" opacity="0.2" filter="url(#blur)"/>

  <!-- glowing shield emblem -->
  <g transform="translate(905,250)" filter="url(#glow)">
    <path d="M70 0 L140 28 L140 86 C140 150 70 184 70 184 C70 184 0 150 0 86 L0 28 Z" fill="url(#accent)" opacity="0.95"/>
    <path d="M70 18 L122 39 L122 84 C122 132 70 158 70 158 C70 158 18 132 18 84 L18 39 Z" fill="#0E1424"/>
    <path d="M44 86 L62 106 L98 64" stroke="#5B8DEF" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- glass content card -->
  <g filter="url(#soft)">
    <rect x="64" y="120" width="720" height="392" rx="28" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <rect x="64" y="120" width="720" height="2" rx="1" fill="#FFFFFF" fill-opacity="0.25"/>
  </g>

  <!-- brand -->
  <g transform="translate(100,156)">
    <path d="M0 0 L26 10 L26 26 C26 43 13 52 13 52 C13 52 0 43 0 26 Z" fill="url(#accent)"/>
    <text x="40" y="35" font-family="'Space Grotesk',Arial,sans-serif" font-size="27" font-weight="700" fill="#FFFFFF">Crypto<tspan fill="#5B8DEF">Watchdog</tspan></text>
  </g>

  <!-- category pill -->
  <g transform="translate(100,238)">
    <rect width="176" height="40" rx="20" fill="#2E6BFF" fill-opacity="0.18" stroke="#5B8DEF" stroke-opacity="0.5"/>
    <circle cx="26" cy="20" r="5" fill="#5B8DEF"/>
    <text x="44" y="26" font-family="Arial,sans-serif" font-size="16" font-weight="700" letter-spacing="2.5" fill="#9DBCFF">WALLETS</text>
  </g>

  <!-- title -->
  <text x="100" y="350" font-family="'Space Grotesk',Arial,sans-serif" font-size="60" font-weight="700" fill="url(#title)" letter-spacing="-1">Ledger vs Trezor</text>
  <text x="100" y="418" font-family="'Space Grotesk',Arial,sans-serif" font-size="60" font-weight="700" fill="url(#title)" letter-spacing="-1">2026: Which Is Safest?</text>

  <line x1="100" y1="460" x2="156" y2="460" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <text x="100" y="494" font-family="Arial,sans-serif" font-size="20" fill="#9AA7C0">Independent, evidence-led hardware wallet reviews</text>
</svg>

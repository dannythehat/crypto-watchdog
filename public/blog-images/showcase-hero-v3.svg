<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Ledger vs Trezor 2026 hardware wallet comparison">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#080A11"/><stop offset="0.5" stop-color="#0E1426"/><stop offset="1" stop-color="#070912"/></linearGradient>
    <radialGradient id="gBlue" cx="0.34" cy="0.42" r="0.45"><stop offset="0" stop-color="#2E6BFF" stop-opacity="0.6"/><stop offset="1" stop-color="#2E6BFF" stop-opacity="0"/></radialGradient>
    <radialGradient id="gGreen" cx="0.66" cy="0.42" r="0.45"><stop offset="0" stop-color="#13C29B" stop-opacity="0.5"/><stop offset="1" stop-color="#13C29B" stop-opacity="0"/></radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2A3142"/><stop offset="0.5" stop-color="#363f54"/><stop offset="1" stop-color="#161b27"/></linearGradient>
    <linearGradient id="accentB" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5B8DEF"/><stop offset="1" stop-color="#2E6BFF"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF" stop-opacity="0.10"/><stop offset="1" stop-color="#FFFFFF" stop-opacity="0.02"/></linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#C3D0E8"/></linearGradient>
    <filter id="blur" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="48"/></filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000" flood-opacity="0.55"/></filter>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#gBlue)"/>
  <rect width="1200" height="630" fill="url(#gGreen)"/>
  <g stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"><path d="M0 157 H1200 M0 315 H1200 M300 0 V630 M600 0 V630 M900 0 V630"/></g>
  <rect x="0" y="0" width="1200" height="5" fill="url(#accentB)"/>

  <!-- brand top-left -->
  <g transform="translate(80,70)">
    <path d="M0 0 L26 10 L26 26 C26 42 13 50 13 50 C13 50 0 42 0 26 Z" fill="url(#accentB)"/>
    <text x="40" y="34" font-family="'Space Grotesk',Arial,sans-serif" font-size="27" font-weight="700" fill="#FFFFFF">Crypto<tspan fill="#5B8DEF">Watchdog</tspan></text>
  </g>
  <!-- category pill top-right -->
  <g transform="translate(1010,74)">
    <rect width="110" height="38" rx="19" fill="#2E6BFF" fill-opacity="0.16" stroke="#5B8DEF" stroke-opacity="0.5"/>
    <text x="55" y="25" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="2" fill="#9DBCFF">WALLETS</text>
  </g>

  <!-- LEDGER device, centered at (510,222) tilted -8 -->
  <g transform="translate(510,222) rotate(-8) translate(-60,-120)">
    <rect x="-22" y="-12" width="164" height="264" rx="42" fill="#2E6BFF" opacity="0.4" filter="url(#blur)"/>
    <g filter="url(#soft)">
      <rect x="0" y="0" width="120" height="240" rx="26" fill="url(#metal)" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <rect x="16" y="24" width="88" height="126" rx="13" fill="#05070E" stroke="#2E6BFF" stroke-opacity="0.55"/>
      <g filter="url(#glow)"><path d="M40 88 L56 106 L86 64" stroke="#5B8DEF" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
      <circle cx="60" cy="194" r="14" fill="#10151f" stroke="#2E6BFF" stroke-opacity="0.5" stroke-width="2"/>
      <circle cx="60" cy="194" r="4.5" fill="#5B8DEF"/>
      <rect x="9" y="10" width="11" height="220" rx="6" fill="#FFFFFF" opacity="0.06"/>
    </g>
  </g>

  <!-- TREZOR device, centered at (690,222) tilted +8 -->
  <g transform="translate(690,222) rotate(8) translate(-60,-120)">
    <rect x="-22" y="-12" width="164" height="264" rx="42" fill="#13C29B" opacity="0.38" filter="url(#blur)"/>
    <g filter="url(#soft)">
      <rect x="0" y="0" width="120" height="240" rx="26" fill="url(#metal)" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <rect x="16" y="24" width="88" height="126" rx="13" fill="#05070E" stroke="#13C29B" stroke-opacity="0.55"/>
      <g filter="url(#glow)" stroke="#4FD693" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="44" y="92" width="32" height="26" rx="5" fill="none"/>
        <path d="M50 92 v-8 a10 10 0 0 1 20 0 v8"/>
      </g>
      <circle cx="60" cy="194" r="14" fill="#10151f" stroke="#13C29B" stroke-opacity="0.5" stroke-width="2"/>
      <circle cx="60" cy="194" r="4.5" fill="#4FD693"/>
      <rect x="9" y="10" width="11" height="220" rx="6" fill="#FFFFFF" opacity="0.06"/>
    </g>
  </g>

  <!-- VS badge centered between devices -->
  <g transform="translate(600,222)" filter="url(#soft)">
    <circle r="33" fill="#0E1426" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="2"/>
    <circle r="33" fill="none" stroke="url(#accentB)" stroke-opacity="0.55" stroke-width="2"/>
    <text y="8" text-anchor="middle" font-family="'Space Grotesk',Arial,sans-serif" font-size="23" font-weight="700" fill="#E6ECF7">VS</text>
  </g>

  <!-- glass title card, centered -->
  <g filter="url(#soft)">
    <rect x="150" y="440" width="900" height="150" rx="24" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <rect x="150" y="440" width="900" height="2" fill="#FFFFFF" fill-opacity="0.22"/>
  </g>
  <text x="600" y="512" text-anchor="middle" font-family="'Space Grotesk',Arial,sans-serif" font-size="46" font-weight="700" fill="url(#title)" letter-spacing="-0.5">Ledger vs Trezor 2026</text>
  <text x="600" y="552" text-anchor="middle" font-family="Arial,sans-serif" font-size="23" fill="#9AA7C0">Which hardware wallet is safest?</text>
</svg>

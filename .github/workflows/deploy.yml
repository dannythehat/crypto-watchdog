name: Deploy to Cloudflare

# Deploys the site straight to Cloudflare Workers, bypassing the (broken) built-in
# Git integration. Manual trigger first; once confirmed working we enable push.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a517d133ccec0093de719211a6694951
          command: deploy

name: Email marketing digest

# Emails Danny the affiliate sign-up list + money status. Runs weekly, on demand,
# and whenever the earnings ledger changes (so any new earnings trigger an email).
# Needs secrets: MAIL_USERNAME, MAIL_PASSWORD (e.g. Gmail app password), MAIL_TO.

on:
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC
  workflow_dispatch:
  push:
    paths:
      - "cw-content-brain/affiliate-ops/ledger.json"

permissions:
  contents: read

jobs:
  email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build digest
        run: node cw-content-brain/scripts/build_signup_digest.mjs

      - name: Load digest into env
        run: |
          { echo "DIGEST<<EOF"; cat marketing-ops/inbox/affiliates-to-signup.md; echo "EOF"; } >> "$GITHUB_ENV"

      - name: Send email
        if: ${{ secrets.MAIL_USERNAME != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: CryptoWatchdog Marketing <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: "CryptoWatchdog — affiliate signups & money status"
          body: ${{ env.DIGEST }}
          convert_markdown: true
